<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Suivi des membres & prospects — Elite 90 Days</title>
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0A0B0E; --bg-2:#0E1014; --surface:#15171D; --surface-2:#1C1F27;
  --border:rgba(255,255,255,.08); --border-2:rgba(255,255,255,.15);
  --text:#ECEEF1; --muted:#9AA1AB; --silver:#CDD4DD;
  --gold:#E6C685; --grad-gold:linear-gradient(135deg,#F7E7BC 0%,#DCB868 44%,#B0853A 100%); --ring:rgba(220,184,104,.45);
  --green:#34D39A; --amber:#E6C685; --red:#ff8f8f; --wa:#25D366;
  --font-display:"Sora",system-ui,sans-serif; --font-cond:"Oswald",system-ui,sans-serif; --font-body:"Inter",system-ui,sans-serif;
  --r:13px; --r-lg:18px;
}
*,*::before,*::after{box-sizing:border-box;} *{margin:0;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.55;font-size:16px;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
.wrap{width:min(100% - 36px,1240px);margin-inline:auto;padding:28px 0 90px;}
.gold-text{background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent;}

.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px;}
.brand-mark{display:grid;place-items:center;height:40px;padding:0 11px;border-radius:11px;background:rgba(220,184,104,.10);border:1px solid rgba(220,184,104,.45);font-family:var(--font-display);font-weight:800;letter-spacing:.12em;font-size:.85rem;}
.brand-mark b{background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent;}
.top h1{font-family:var(--font-display);font-weight:800;font-size:1.4rem;letter-spacing:-.01em;}
.top .sub{color:var(--muted);font-size:.85rem;}

.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;}
.stat .v{font-family:var(--font-display);font-weight:800;font-size:1.45rem;}
.stat .l{color:var(--muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.07em;}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.toolbar input,.toolbar select{font:inherit;color:var(--text);background:var(--surface);border:1px solid var(--border-2);border-radius:10px;padding:10px 13px;}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:var(--gold);}
.spacer{flex:1;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:999px;border:1px solid transparent;font-family:var(--font-cond);font-weight:600;font-size:.9rem;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:transform .15s ease,border-color .2s ease,background .2s ease;}
.btn-gold{background:var(--grad-gold);color:#1a1407;}
.btn-gold:hover{transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--silver);border-color:var(--border-2);}
.btn-ghost:hover{border-color:var(--gold);color:#fff;}
.btn-sm{padding:8px 12px;font-size:.78rem;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;display:flex;flex-direction:column;gap:11px;}
.card.is-membre{border-color:rgba(220,184,104,.4);}
.card .hd{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.card .name{font-family:var(--font-display);font-weight:700;font-size:1.06rem;}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
.tag{font-family:var(--font-cond);text-transform:uppercase;letter-spacing:.08em;font-size:.68rem;border-radius:999px;padding:3px 9px;border:1px solid var(--border-2);color:var(--muted);}
.tag.t-membre{color:#1a1407;background:var(--grad-gold);border-color:transparent;}
.tag.t-prospect{color:var(--silver);}
.tag.promo{color:var(--gold);border-color:rgba(220,184,104,.35);}
.tag.react-ok{color:#9af0c4;border-color:rgba(52,211,154,.5);}
.tag.react-mid{color:#f0dca0;border-color:rgba(230,198,133,.5);}
.tag.react-bad{color:#ffb4b4;border-color:rgba(255,143,143,.5);}
.meta{color:var(--muted);font-size:.82rem;}
.cycle{font-size:.78rem;color:var(--muted);}
.cyclebar{height:6px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:4px;}
.cyclebar > i{display:block;height:100%;background:linear-gradient(90deg,#34D39A,#E6C685);border-radius:999px;}
.bar-l{display:flex;justify-content:space-between;font-size:.74rem;color:var(--muted);margin-bottom:5px;}
.bar{height:8px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;}
.bar > i{display:block;height:100%;background:var(--grad-gold);border-radius:999px;transition:width .3s ease;}
.steps{display:flex;flex-wrap:wrap;gap:5px;}
.chip{font-size:.7rem;padding:4px 8px;border-radius:999px;border:1px solid var(--border-2);color:var(--muted);cursor:pointer;user-select:none;transition:all .15s ease;}
.chip.on{background:rgba(220,184,104,.14);border-color:var(--gold);color:#fff;}
.actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:3px;}
.a{display:inline-flex;align-items:center;gap:6px;padding:8px 11px;border-radius:10px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border-2);background:transparent;color:var(--silver);transition:all .15s ease;}
.a:hover{border-color:var(--gold);color:#fff;}
.a.wa{background:rgba(37,211,102,.12);border-color:rgba(37,211,102,.5);color:#8af0b2;}
.a.wa:hover{background:rgba(37,211,102,.2);}

.empty{text-align:center;padding:60px 20px;color:var(--muted);border:1px dashed var(--border-2);border-radius:var(--r-lg);}

.modal{position:fixed;inset:0;z-index:200;background:rgba(5,6,8,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px;}
.modal.show{display:flex;}
.modal .panel{width:min(100%,580px);max-height:90vh;overflow:auto;background:var(--bg-2);border:1px solid var(--border-2);border-radius:var(--r-lg);padding:24px;}
.modal h2{font-family:var(--font-display);font-weight:800;font-size:1.3rem;margin-bottom:16px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field.full{grid-column:1 / -1;}
.field label{font-size:.8rem;color:var(--muted);}
.field input,.field select,.field textarea{font:inherit;color:var(--text);background:var(--surface);border:1px solid var(--border-2);border-radius:10px;padding:11px 13px;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--ring);}
.modal .foot{display:flex;justify-content:space-between;gap:10px;margin-top:8px;}

.settings{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:20px;}
.settings summary{cursor:pointer;font-family:var(--font-cond);text-transform:uppercase;letter-spacing:.1em;font-size:.85rem;color:var(--gold);}
.settings .body{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.settings .hint{grid-column:1/-1;color:var(--muted);font-size:.8rem;}

@media (max-width:760px){ .stats{grid-template-columns:1fr 1fr;} .frow{grid-template-columns:1fr;} .settings .body{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div id="authgate" style="position:fixed;inset:0;background:#0A0B0E;color:#9AA1AB;display:grid;place-items:center;z-index:9999;font-family:Inter,system-ui,sans-serif;text-align:center;padding:24px;">Vérification de l'accès admin…</div>
<div class="wrap">

  <div class="top">
    <div>
      <div style="display:flex;align-items:center;gap:11px;margin-bottom:6px;"><span class="brand-mark"><b>TLC</b></span><span class="sub">Tableau de bord privé · CRM</span></div>
      <h1>Membres & <span class="gold-text">prospects</span></h1>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <a href="admin-events.html" class="btn btn-ghost btn-sm">📅 Événements</a>
      <button class="btn btn-ghost btn-sm" id="importBrevo">Importer Brevo (CSV)</button>
      <button class="btn btn-ghost btn-sm" id="exportPhones">Export n° (filtre)</button>
      <button class="btn btn-ghost btn-sm" id="exportCsv">Export CSV</button>
      <button class="btn btn-ghost btn-sm" id="exportJson">Sauvegarde</button>
      <button class="btn btn-ghost btn-sm" id="importJson">Restaurer</button>
      <input type="file" id="fileBrevo" accept=".csv,text/csv" hidden />
      <input type="file" id="fileJson" accept="application/json" hidden />
    </div>
  </div>

  <details class="settings">
    <summary>⚙️ Réglages — lien Zoom & message WhatsApp</summary>
    <div class="body">
      <div class="field"><label>Lien Zoom (réunion fixe)</label><input id="set-zoom" placeholder="https://zoom.us/j/........" /></div>
      <div class="field"><label>Lien document (optionnel)</label><input id="set-doc" placeholder="https://..." /></div>
      <div class="field full"><label>Modèle de message WhatsApp — variables : {prenom} {zoom} {doc}</label><input id="set-wa" placeholder="Salut {prenom} ! Voici le lien de notre appel : {zoom}" /></div>
      <p class="hint">Le bouton WhatsApp ouvre la discussion avec ce message déjà rempli, et marque le membre « contacté aujourd'hui ».</p>
    </div>
  </details>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <input id="search" placeholder="🔎 Rechercher…" />
    <select id="filterType"><option value="">Tous</option><option>Prospect</option><option>Membre</option></select>
    <select id="filterPromo"><option value="">Toutes promotions</option></select>
    <select id="filterReact"><option value="">Toute réactivité</option><option value="bad">À relancer</option><option value="mid">Tièdes</option><option value="ok">Réactifs</option></select>
    <span class="spacer"></span>
    <button class="btn btn-gold" id="addBtn">+ Ajouter</button>
  </div>

  <div id="list"></div>
</div>

<div class="modal" id="modal">
  <div class="panel">
    <h2 id="modalTitle">Nouveau contact</h2>
    <input type="hidden" id="m-id" />
    <div class="frow">
      <div class="field"><label>Prénom & Nom *</label><input id="m-nom" /></div>
      <div class="field"><label>Type</label><select id="m-type"><option>Prospect</option><option>Membre</option></select></div>
    </div>
    <div class="frow">
      <div class="field"><label>Promotion / Cohorte</label><input id="m-promo" placeholder="ex. Promo Janv. 2026" list="promos" /><datalist id="promos"></datalist></div>
      <div class="field"><label>Statut</label><select id="m-statut"><option>Nouveau</option><option>VSL vue</option><option>Candidature</option><option>Appel prévu</option><option>Actif</option><option>En pause</option><option>Terminé</option><option>Abandon</option></select></div>
    </div>
    <div class="frow">
      <div class="field"><label>Téléphone WhatsApp</label><input id="m-phone" placeholder="ex. 0612345678" /></div>
      <div class="field"><label>E-mail</label><input id="m-email" /></div>
    </div>
    <div class="frow">
      <div class="field"><label>Date d'inscription</label><input id="m-inscription" type="date" /></div>
      <div class="field"><label>Dernier contact</label><input id="m-contact" type="date" /></div>
    </div>
    <div class="field full" style="margin-bottom:12px;"><label>Notes</label><textarea id="m-notes" rows="3"></textarea></div>
    <div class="foot">
      <button class="btn btn-ghost btn-sm" id="delBtn" style="color:#ff8f8f;border-color:rgba(255,143,143,.4);">Supprimer</button>
      <div style="display:flex;gap:10px;"><button class="btn btn-ghost btn-sm" id="cancelBtn">Annuler</button><button class="btn btn-gold btn-sm" id="saveBtn">Enregistrer</button></div>
    </div>
  </div>
</div>

<!-- Connexion sécurisée (Supabase). Voir GUIDE-CONNEXION-SUPABASE.md -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth-config.js"></script>
<script src="js/auth.js"></script>
<script>
  (async function () {
    var g = document.getElementById('authgate');
    var access = await window.TLCAuth.requireAdmin(); // redirige vers connexion.html si non admin
    if (access && g) g.style.display = 'none';         // admin OK (ou mode chantier)
