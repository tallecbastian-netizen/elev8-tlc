<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gestion des membres — TLC</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0A0B0E; --surface:#15171D; --surface-2:#1C1F27; --border:rgba(255,255,255,.08); --border-2:rgba(255,255,255,.15);
  --text:#ECEEF1; --muted:#9AA1AB; --silver:#CDD4DD;
  --gold:#E6C685; --grad-gold:linear-gradient(135deg,#F7E7BC 0%,#DCB868 44%,#B0853A 100%); --ring:rgba(220,184,104,.45);
  --fc:"Oswald",system-ui,sans-serif; --fb:"Inter",system-ui,sans-serif; --fd:"Sora",system-ui,sans-serif;
  --ok:#9be3b0; --soon:#f2d479; --exp:#ff9b9b;
}
*,*::before,*::after{box-sizing:border-box;} *{margin:0;}
body{font-family:var(--fb);background:var(--bg);color:var(--text);line-height:1.5;padding:0 0 60px;}
a{color:inherit;text-decoration:none;}
.wrap{width:min(100% - 32px,1200px);margin-inline:auto;}
header.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:18px 0;border-bottom:1px solid var(--border);margin-bottom:22px;}
.brand-mark{display:inline-grid;place-items:center;height:40px;padding:0 12px;border-radius:11px;background:rgba(220,184,104,.10);border:1px solid var(--ring);font-family:var(--fd);font-weight:800;letter-spacing:.12em;}
.brand-mark b{background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent;}
h1{font-family:var(--fd);font-size:1.25rem;font-weight:700;}
.top .right{display:flex;align-items:center;gap:12px;font-size:.82rem;color:var(--muted);flex-wrap:wrap;}
.linkbtn{font-family:var(--fc);text-transform:uppercase;letter-spacing:.12em;font-size:.74rem;color:var(--muted);padding:8px 12px;border:1px solid var(--border-2);border-radius:9px;}
.linkbtn:hover{color:var(--gold);border-color:var(--gold);}
.notice{display:none;background:rgba(242,212,121,.10);border:1px solid rgba(242,212,121,.4);color:#f2d479;padding:12px 16px;border-radius:11px;margin-bottom:16px;font-size:.9rem;}
.review{display:none;background:rgba(220,184,104,.08);border:1px solid var(--ring);color:var(--silver);padding:12px 16px;border-radius:11px;margin-bottom:16px;font-size:.92rem;}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
input,select,textarea{font-family:var(--fb);background:var(--surface-2);border:1px solid var(--border-2);color:var(--text);border-radius:9px;padding:10px 12px;font-size:.92rem;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);}
#search{flex:1;min-width:180px;}
.btn{font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:.8rem;border-radius:9px;padding:10px 16px;cursor:pointer;background:var(--surface-2);border:1px solid var(--border-2);color:var(--text);}
.btn.gold{background:var(--grad-gold);color:#1a1407;border:0;font-weight:600;}
.btn:hover{border-color:var(--gold);}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 12px;font-size:.8rem;color:var(--muted);}
.stat b{color:var(--text);font-family:var(--fd);}
.tablewrap{overflow-x:auto;border:1px solid var(--border);border-radius:14px;}
table{width:100%;border-collapse:collapse;font-size:.86rem;min-width:820px;}
th{font-family:var(--fc);text-transform:uppercase;letter-spacing:.1em;font-size:.7rem;color:var(--muted);text-align:left;padding:12px 14px;border-bottom:1px solid var(--border);}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:0;}
.sub{color:var(--muted);font-size:.8rem;}
.empty{text-align:center;color:var(--muted);padding:26px;}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:.72rem;font-family:var(--fc);letter-spacing:.04em;border:1px solid var(--border-2);}
.s-ok{color:var(--ok);border-color:rgba(155,227,176,.4);} .s-soon{color:var(--soon);border-color:rgba(242,212,121,.4);}
.s-exp{color:var(--exp);border-color:rgba(255,155,155,.4);} .s-prospect{color:var(--silver);}
.acts{white-space:nowrap;}
.act{font-family:var(--fc);text-transform:uppercase;letter-spacing:.05em;font-size:.7rem;padding:6px 10px;margin:2px;border-radius:7px;border:1px solid var(--border-2);background:transparent;color:var(--silver);cursor:pointer;display:inline-block;}
.act:hover{border-color:var(--gold);color:var(--gold);}
.act.gold{background:rgba(220,184,104,.14);border-color:var(--ring);color:var(--gold);}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;align-items:center;justify-content:center;padding:20px;}
.modal .box{width:min(100%,460px);background:var(--surface);border:1px solid var(--border-2);border-radius:16px;padding:24px;max-height:90vh;overflow:auto;}
.modal h2{font-family:var(--fd);font-size:1.1rem;margin-bottom:12px;}
.modal label{display:block;font-family:var(--fc);text-transform:uppercase;letter-spacing:.1em;font-size:.68rem;color:var(--silver);margin:10px 0 5px;}
.modal input,.modal select,.modal textarea{width:100%;}
.modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
#authgate{position:fixed;inset:0;background:var(--bg);color:var(--muted);display:grid;place-items:center;z-index:999;text-align:center;padding:24px;font-family:var(--fb);}
</style>
</head>
<body>
  <div id="authgate">Vérification de l'accès admin…</div>

  <div class="wrap">
    <header class="top">
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="brand-mark"><b>TLC</b></span>
        <h1>Gestion des membres</h1>
      </div>
      <div class="right">
        <span id="me"></span>
        <a class="linkbtn" href="espace-membre.html">← Espace membre</a>
        <button class="linkbtn" id="btn-signout" style="background:none;cursor:pointer;">Déconnexion</button>
      </div>
    </header>

    <div class="notice" id="notice"></div>
    <div class="review" id="review"></div>

    <div class="toolbar">
      <input id="search" type="text" placeholder="Rechercher (nom, e-mail, promo)…" />
      <select id="filter">
        <option value="all">Tous</option>
        <option value="prospect">Prospects</option>
        <option value="actif">Membres actifs</option>
        <option value="inactif">Membres inactifs</option>
        <option value="bientot">Expirent &lt; 7 j</option>
      </select>
      <button class="btn gold" id="btn-add">+ Ajouter</button>
      <button class="btn" id="btn-export">Export CSV</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="tablewrap">
      <table>
        <thead><tr>
          <th>Personne</th><th>Promo</th><th>Dernier paiement</th><th>Accès jusqu'au</th><th>Catégorie</th><th>Gestion</th><th></th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="box">
      <h2 id="m-title">Nouvelle fiche</h2>
      <input type="hidden" id="m-id" />
      <label for="m-nom">Nom</label><input id="m-nom" type="text" />
      <label for="m-email">E-mail *</label><input id="m-email" type="email" />
      <label for="m-tel">Téléphone</label><input id="m-tel" type="tel" placeholder="06…" />
      <label for="m-statut">Statut</label>
      <select id="m-statut"><option value="prospect">Prospect</option><option value="membre">Membre</option></select>
      <label for="m-paiement">Date du dernier paiement (vide = pas payé → inactif)</label>
      <input id="m-paiement" type="date" />
      <label for="m-promo">Promo</label><input id="m-promo" type="text" placeholder="ex : Promo 1" />
      <label for="m-notes">Notes</label><textarea id="m-notes" rows="2"></textarea>
      <div class="actions">
        <button class="btn" id="btn-cancel">Annuler</button>
        <button class="btn gold" id="btn-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/gestion-membres.js"></script>
</body>
</html>
