<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Espace membre — Bastian Tallec</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0A0B0E; --surface:#15171D; --surface-2:#1C1F27; --border:rgba(255,255,255,.08); --border-2:rgba(255,255,255,.15);
  --text:#ECEEF1; --muted:#9AA1AB; --silver:#CDD4DD;
  --gold:#E6C685; --grad-gold:linear-gradient(135deg,#F7E7BC 0%,#DCB868 44%,#B0853A 100%); --ring:rgba(220,184,104,.45);
  --fd:"Sora",system-ui,sans-serif; --fc:"Oswald",system-ui,sans-serif; --fb:"Inter",system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;} *{margin:0;}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:24px;
  background-image:radial-gradient(60% 45% at 50% -8%,rgba(220,184,104,.12),transparent 60%);}
a{color:var(--gold);text-decoration:none;}
.card{width:min(100%,420px);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:34px 30px;text-align:center;}
.brand-mark{display:inline-grid;place-items:center;height:46px;padding:0 14px;border-radius:12px;background:rgba(220,184,104,.10);border:1px solid var(--ring);font-family:var(--fd);font-weight:800;letter-spacing:.12em;margin-bottom:18px;}
.brand-mark b{background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent;}
h1{font-family:var(--fd);font-weight:700;font-size:1.5rem;margin-bottom:6px;}
.sub{color:var(--muted);font-size:.92rem;margin-bottom:22px;}
label{display:block;text-align:left;font-family:var(--fc);text-transform:uppercase;letter-spacing:.14em;font-size:.74rem;color:var(--silver);margin:0 0 7px 2px;}
input{width:100%;padding:14px 15px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border-2);color:var(--text);font-size:1rem;font-family:var(--fb);outline:none;transition:border-color .2s;}
input:focus{border-color:var(--gold);}
button{width:100%;margin-top:16px;padding:14px 16px;border:0;border-radius:11px;background:var(--grad-gold);color:#1a1407;font-family:var(--fc);font-weight:600;text-transform:uppercase;letter-spacing:.08em;font-size:.95rem;cursor:pointer;}
button:disabled{opacity:.5;cursor:default;}
.msg{margin-top:14px;font-size:.86rem;min-height:1.1em;}
.msg.err{color:#ff9b9b;} .msg.ok{color:#9be3b0;}
.back{display:inline-block;margin-top:20px;font-family:var(--fc);text-transform:uppercase;letter-spacing:.12em;font-size:.76rem;color:var(--muted);}
.back:hover{color:var(--gold);}
</style>
</head>
<body>
  <div class="card">
    <span class="brand-mark"><b>TLC</b></span>
    <h1>Espace membre</h1>
    <p class="sub">Entre ton adresse e-mail pour accéder à ton espace.</p>

    <label for="email">Ton adresse e-mail</label>
    <input type="email" id="email" placeholder="prenom@mail.com" autocomplete="email" />
    <button id="btn">Entrer</button>

    <div class="msg" id="msg"></div>
    <a class="back" href="index.html">← Retour au site</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
  (function(){
    var $ = function(id){ return document.getElementById(id); };
    var msg = $("msg");
    function show(t,k){ msg.textContent = t||""; msg.className = "msg" + (k?(" "+k):""); }

    // Déjà connecté ? (admin ou membre valide) -> on entre directement
    if (window.TLCAuth.isAdmin && window.TLCAuth.isAdmin()) { location.replace("espace-membre.html"); return; }
    var s = window.TLCAuth.memberSession && window.TLCAuth.memberSession();
    if (s && s.until && s.until >= window.TLCAuth.today()) { location.replace("espace-membre.html"); return; }

    async function enter(){
      var email = ($("email").value||"").trim().toLowerCase();
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ show("Entre une adresse e-mail valide.","err"); return; }
      $("btn").disabled = true; show("Vérification…");
      try{
        // 1) Est-ce l'admin ? -> accès espace membre + gestion
        if (window.TLCAuth.adminLogin(email)) { show("Accès admin ✓","ok"); location.replace("espace-membre.html"); return; }
        // 2) Sinon, membre actif ?
        var r = await window.TLCAuth.memberLogin(email);
        if (r.active) { show("Accès confirmé ✓","ok"); location.replace("espace-membre.html"); return; }
        show("Ton accès n'est pas actif (ou a expiré). Contacte Bastian pour l'activer.","err");
      }catch(e){
        show("Erreur : "+((e&&e.message)||"réessaie")+".","err");
      }finally{ $("btn").disabled = false; }
    }
    $("btn").addEventListener("click", enter);
    $("email").addEventListener("keydown", function(e){ if(e.key==="Enter") enter(); });
  })();
  </script>
</body>
</html>
